env_name: "dual_deepmimic"

char_file_a: "data/assets/g1/g1.xml"
char_file_b: "data/assets/g1/g1.xml"
camera_mode: "track"

episode_length: 8.0
global_obs: True
root_height_obs: True
pose_termination: False
pose_termination_dist: 2.0
enable_early_termination: True
enable_phase_obs: False
enable_tar_obs: True
num_phase_encoding: 4
tar_obs_steps: [1, 2, 3]
rand_reset: False
ground_align_on_reset: True
enable_self_collisions: False
inter_actor_collisions: True
control_mode: "dual"

track_root_h: True
track_root: True

inter_actor_contact_bodies_a: ["torso_link", "head_link",
                               "left_shoulder_pitch_link", "left_shoulder_roll_link", "left_shoulder_yaw_link", "left_elbow_link", "left_wrist_roll_link", "left_wrist_pitch_link", "left_wrist_yaw_link",
                               "right_shoulder_pitch_link", "right_shoulder_roll_link", "right_shoulder_yaw_link", "right_elbow_link", "right_wrist_roll_link", "right_wrist_pitch_link", "right_wrist_yaw_link"]
inter_actor_contact_bodies_b: ["torso_link", "head_link",
                               "left_shoulder_pitch_link", "left_shoulder_roll_link", "left_shoulder_yaw_link", "left_elbow_link", "left_wrist_roll_link", "left_wrist_pitch_link", "left_wrist_yaw_link",
                               "right_shoulder_pitch_link", "right_shoulder_roll_link", "right_shoulder_yaw_link", "right_elbow_link", "right_wrist_roll_link", "right_wrist_pitch_link", "right_wrist_yaw_link"]
reward_contact_w: 0.15
reward_contact_scale: 10.0
contact_dist_threshold: 0.1

key_bodies_a: ["head_link", "left_wrist_yaw_link", "right_wrist_yaw_link"]
key_bodies_b: ["head_link", "left_wrist_yaw_link", "right_wrist_yaw_link"]

contact_bodies_a: ["left_ankle_roll_link", "right_ankle_roll_link"]
contact_bodies_b: ["left_ankle_roll_link", "right_ankle_roll_link"]

pose_termination_bodies_a: ["torso_link", "head_link",
                            "left_shoulder_pitch_link", "left_shoulder_roll_link", "left_shoulder_yaw_link", "left_elbow_link", "left_wrist_yaw_link",
                            "right_shoulder_pitch_link", "right_shoulder_roll_link", "right_shoulder_yaw_link", "right_elbow_link", "right_wrist_yaw_link"]
pose_termination_bodies_b: ["torso_link", "head_link",
                            "left_shoulder_pitch_link", "left_shoulder_roll_link", "left_shoulder_yaw_link", "left_elbow_link", "left_wrist_yaw_link",
                            "right_shoulder_pitch_link", "right_shoulder_roll_link", "right_shoulder_yaw_link", "right_elbow_link", "right_wrist_yaw_link"]

motion_file_a: "dual_data/converted/egohuman_dual_g1_upper_back_symmetric_g1_a.pkl"
motion_file_b: "dual_data/converted/egohuman_dual_g1_upper_back_symmetric_g1_b.pkl"

init_pose_a: [0.0, 0.0, 0.85]
init_pose_b: [0.0, 0.0, 0.85]

# Keep a light lower-body pose target so gait stays compatible with the
# upper-body interaction motion, without forcing exact leg imitation.
joint_err_w_a: [0.28, 0.28, 0.28, 0.18, 0.14, 0.14,
                0.28, 0.28, 0.28, 0.18, 0.14, 0.14,
                1.0, 1.0, 1.0, 0.0,
                1.0, 0.6, 0.6, 0.4, 0.3, 0.3, 0.3,
                1.0, 0.6, 0.6, 0.4, 0.3, 0.3, 0.3]
joint_err_w_b: [0.28, 0.28, 0.28, 0.18, 0.14, 0.14,
                0.28, 0.28, 0.28, 0.18, 0.14, 0.14,
                1.0, 1.0, 1.0, 0.0,
                1.0, 0.6, 0.6, 0.4, 0.3, 0.3, 0.3,
                1.0, 0.6, 0.6, 0.4, 0.3, 0.3, 0.3]

# Match the SMPL upper-only reward split, but retain the nonzero G1 leg
# weights above so the robots are guided rather than unconstrained below
# the waist.
reward_pose_w: 0.35
reward_vel_w: 0.05
reward_root_pose_w: 0.1
reward_root_vel_w: 0.05
reward_key_pos_w: 0.1
reward_rel_key_pos_w: 0.1

reward_pose_scale: 0.25
reward_vel_scale: 0.01
reward_root_pose_scale: 5.0
reward_root_vel_scale: 1.0
reward_key_pos_scale: 10.0
reward_rel_key_pos_scale: 10.0

reward_balance_w: 0.1
reward_upright_w: 0.1
reward_foot_contact_w: 0.05
target_root_height: 0.85

engine:
  sim_freq: 240
  control_freq: 30
  ccd_iterations: 135
  solver_njmax: 1200
  solver_nconmax: 400
  solver_iterations: 120
  solver_ls_iterations: 60
  use_cuda_graph: False
